version: "3.9"

services:
  backend:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: backend
    working_dir: /app
    volumes:
      - /home/raspberry/Projects/webapp/backend:/app
    command: ["mvn", "spring-boot:run"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST}:5432/user
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8080
    ports:
      - "8082:8080"
    restart: always

  frontend-builder:
    image: node:20-alpine
    container_name: frontend-builder
    working_dir: /app
    volumes:
      - /home/raspberry/Projects/webapp/frontend:/app
    command: ["sh", "-c", "npm install && npm run build"]
    restart: on-failure

  frontend:
    image: nginx:alpine
    container_name: frontend
    depends_on:
      - frontend-builder
    volumes:
      - /home/raspberry/Projects/webapp/frontend/dist:/usr/share/nginx/html
      - /home/raspberry/Projects/webapp/config:/etc/nginx/conf.d
    ports:
      - "8083:80"
    restart: always
